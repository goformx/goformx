services:
  web:
    build:
      context: ./docker/php
    volumes:
      - .:/app
    ports:
      - "8080:80"
    depends_on:
      - mariadb
    environment:
      - APP_ENV=local
      - APP_URL=http://localhost:8080
      - APP_SECRET=local-dev-secret-change-in-production
      - GOFORMS_API_URL=http://goforms:8090
      - GOFORMS_SHARED_SECRET=${GOFORMS_SHARED_SECRET:-local-dev-shared-secret-must-be-32chars}
      - GOFORMS_PUBLIC_URL=http://localhost:8091
      - DB_HOST=mariadb
      - DB_DATABASE=goformx
      - DB_USERNAME=goformx
      - DB_PASSWORD=goformx
      - STRIPE_KEY=${STRIPE_KEY:-}
      - STRIPE_SECRET=${STRIPE_SECRET:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}

  mariadb:
    image: mariadb:11.8
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3307:3306"
    environment:
      MARIADB_DATABASE: goformx
      MARIADB_USER: goformx
      MARIADB_PASSWORD: goformx
      MARIADB_ROOT_PASSWORD: root

  goforms:
    build:
      context: ../goforms
      dockerfile: docker/development/Dockerfile
    ports:
      - "8091:8090"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../goforms:/app
    environment:
      - APP_NAME=goforms
      - APP_ENV=development
      - APP_DEBUG=true
      - APP_LOG_LEVEL=debug
      - APP_SCHEME=http
      - APP_PORT=8090
      - APP_HOST=0.0.0.0
      - DATABASE_DRIVER=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=goforms
      - DATABASE_USERNAME=goforms
      - DATABASE_PASSWORD=goforms
      - GOFORMS_SHARED_SECRET=${GOFORMS_SHARED_SECRET:-local-dev-shared-secret-must-be-32chars}
      - SESSION_SECRET=${SESSION_SECRET:-local-dev-session-secret-32chars-ok}
      - SECURITY_CSRF_SECRET=${SECURITY_CSRF_SECRET:-local-dev-csrf-secret-32chars-long}
      - CORS_ALLOWED_ORIGINS=http://localhost:8080
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: goforms
      POSTGRES_USER: goforms
      POSTGRES_PASSWORD: goforms
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goforms -d goforms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  mariadb_data:
  postgres_data:
