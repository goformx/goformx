server {
    listen 80;
    server_name goformx.com www.goformx.com;
    return 301 https://goformx.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name goformx.com;

    root /home/deployer/goformx-web/current/public;
    index index.php;

    ssl_certificate /etc/letsencrypt/live/goformx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goformx.com/privkey.pem;

    # Security headers (also set by PHP middleware, but belt-and-suspenders)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Vite built assets
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static files
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        try_files $uri =404;
    }

    # PHP
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    # Stripe webhook needs higher body size
    location = /stripe/webhook {
        client_max_body_size 4m;
        try_files $uri /index.php?$query_string;
    }
}
